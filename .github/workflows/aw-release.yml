name: aw Sync and Release

# When we tag aw-vX.Y.Z on aweb, this workflow pushes cli/go/ to the
# awebai/aw repo with tag vX.Y.Z. The aw repo's own release workflow
# then handles goreleaser (binaries) and npm publishing.

on:
  push:
    tags:
      - 'aw-v*'

jobs:
  sync-to-aw:
    name: Sync cli/go to awebai/aw
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aweb
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#aw-v}" >> "$GITHUB_OUTPUT"

      - name: Configure SSH for awebai/aw
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AW_DEPLOY_KEY }}" > ~/.ssh/aw_deploy_key
          chmod 600 ~/.ssh/aw_deploy_key
          cat >> ~/.ssh/config <<EOF
          Host github.com-aw
            HostName github.com
            User git
            IdentityFile ~/.ssh/aw_deploy_key
            StrictHostKeyChecking no
          EOF

      - name: Push cli/go to awebai/aw
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Clone aw repo
          git clone git@github.com-aw:awebai/aw.git /tmp/aw-release
          cd /tmp/aw-release

          # Remove everything except .git
          git rm -rf . > /dev/null 2>&1 || true
          git clean -fdx

          # Copy cli/go contents (this is the aw source)
          cp -a "$GITHUB_WORKSPACE/cli/go/." .

          # Commit and tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to sync" && exit 0
          git commit -m "Sync from awebai/aweb aw-v${VERSION}"
          git tag "v${VERSION}"
          git push origin main
          git push origin "v${VERSION}"

          echo "Pushed v${VERSION} to awebai/aw — release workflow will take over"
