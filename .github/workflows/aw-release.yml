name: aw Sync and Release

# When we tag aw-vX.Y.Z on aweb, this workflow:
# 1. Pushes cli/go/ contents to awebai/aw (preserving aw's .github/)
# 2. Tags the commit as vX.Y.Z
# The tag push triggers aw's own release workflow (goreleaser + npm).
#
# Requires AW_REPO_TOKEN secret: fine-grained PAT with contents:write,
# actions:write, and metadata:read on awebai/aw.

on:
  push:
    tags:
      - 'aw-v*'

jobs:
  sync-to-aw:
    name: Sync cli/go to awebai/aw
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aweb
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#aw-v}" >> "$GITHUB_OUTPUT"

      - name: Push cli/go to awebai/aw
        env:
          AW_REPO_TOKEN: ${{ secrets.AW_REPO_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git clone "https://x-access-token:${AW_REPO_TOKEN}@github.com/awebai/aw.git" /tmp/aw-release
          cd /tmp/aw-release

          # Remove everything EXCEPT .git and .github (preserve aw's own workflows)
          find . -maxdepth 1 \
            -not -name '.' \
            -not -name '.git' \
            -not -name '.github' \
            -exec rm -rf {} +

          # Copy cli/go contents (this is the aw source)
          cp -a "$GITHUB_WORKSPACE/cli/go/." .

          # Commit
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No code changes to sync"
          else
            git commit -m "Sync from awebai/aweb aw-v${VERSION}"
            git push origin main
          fi

          # Tag — the push triggers aw's release workflow
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
