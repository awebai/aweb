name: Awid Release (GHCR)

# Tag awid-vX.Y.Z to publish the awid container image to GHCR.

on:
  push:
    tags:
      - 'awid-v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and publish awid image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Verify version matches tag
        working-directory: awid
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#awid-v}"
          PKG_VERSION="$(python3 -c "
          import re
          text = open('pyproject.toml').read()
          m = re.search(r'version\s*=\s*\"([^\"]+)\"', text)
          print(m.group(1))
          ")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi
          echo "AWID_VERSION=$PKG_VERSION" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/awid
          tags: |
            type=raw,value=${{ env.AWID_VERSION }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=awid
            org.opencontainers.image.description=Thin awid.ai registry service wrapper around aweb
            org.opencontainers.image.version=${{ env.AWID_VERSION }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: awid/Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
